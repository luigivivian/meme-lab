- acao: O Mago Mestre, um idoso sábio com uma longa barba e vestes esvoaçantes, está
    reclinado em uma poltrona de couro ricamente adornada. Ele segura um cachimbo
    de madeira entalhada, com uma fumaça etérea e azulada saindo da piteira, formando
    redemoinhos delicados. Seu rosto exibe um sorriso caloroso e genuíno, com os olhos
    semicerrados em contentamento e rugas de sabedoria ao redor. Uma de suas mãos
    repousa no braço da poltrona, com anéis antigos brilhando suavemente, enquanto
    a outra segura o cachimbo com um gesto tranquilo. A expressão é de paz e profunda
    satisfação, como se estivesse refletindo sobre uma memória agradável ou um conhecimento
    recém-adquirido.
  cenario: Um close-up cinematográfico, capturado com uma lente de 85mm e uma abertura
    de f/1.8 para um bokeh cremoso e suave. O Mago está em uma biblioteca antiga e
    escura, iluminada apenas pelo brilho quente de uma lareira crepitante à esquerda
    do quadro e uma luz dourada suave vinda de uma janela alta e empoeirada, à direita.
    Pilhas de livros encadernados em couro e pergaminhos antigos preenchem as estantes
    de madeira escura ao fundo, adicionando textura e profundidade. Partículas de
    poeira dourada dançam na luz ambiente. A atmosfera é aconchegante, íntima e cheia
    de mistério, com sombras profundas e realces sutis que acentuam a sabedoria e
    a serenidade do Mago.
  colors:
  - '#1A1A3E'
  - '#2C3E6B'
  - '#0D1B2A'
  - '#3E2723'
  - '#5D4037'
